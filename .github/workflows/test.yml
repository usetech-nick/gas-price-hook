name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build

      - name: Check contract sizes
        run: |
          echo "Checking GasPriceFeesHook size (dependencies excluded)..."
          forge build --sizes 2>&1 | grep -E "GasPriceFeesHook|Contract" || true
          echo "Note: PoolManager from v4-core exceeds EIP-170 but that's expected for the singleton."

      - name: Run Forge tests
        run: forge test -vvv
